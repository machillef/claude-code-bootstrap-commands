#:schema https://developers.openai.com/codex/config-schema.json

# Repo-local Codex defaults for contributors working on this repository.
# Keep this conservative and avoid pinning top-level model/provider defaults.

approval_policy = "on-request"
sandbox_mode = "workspace-write"

[features]
multi_agent = true

[agents]
max_threads = 6
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "Reviewer focused on correctness, security, regressions, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Documentation specialist that verifies APIs and framework behavior against primary docs."
config_file = "agents/docs-researcher.toml"
